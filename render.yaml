services:
  - type: web
    name: goggles-im2026
    runtime: python
    region: singapore
    plan: starter
    autoDeployTrigger: "off"
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
